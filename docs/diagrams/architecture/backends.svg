ont-style="italic" lengthAdjust="spacing" textLength="157.8214" x="54.8389" y="345.1657">PathMapSharingBackend</text><text fill="#102027" font-family="sans-serif" font-size="14" font-style="italic" lengthAdjust="spacing" textLength="70.7137" x="98.3927" y="364.2337">(cfg f1r3fly)</text><line style="stroke:#1565C0;stroke-width:0.5;" x1="8" x2="259.4991" y1="373.3356" y2="373.3356"/><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="18" cy="388.3696" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="222.1371" x="27" y="392.3016">share_prefix(&amp;[u8]) : Option&lt;Self&gt;</text><g data-visibility-modifier="PUBLIC_METHOD"><ellipse cx="18" cy="407.4375" fill="#84BE84" rx="3" ry="3" style="stroke:#038048;stroke-width:1;"/></g><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="227.4991" x="27" y="411.3695">shares_structure_with(&amp;Self) : bool</text></g><!--class HMB--><g class="entity" data-qualified-name="HMB" data-source-line="34" id="ent0003"><rect fill="#ECEFF1" height="121.3396" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="304.3189" x="295.59" y="311.6598"/><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="119.0555" x="388.2217" y="331.6257">HashMapBackend</text><line style="stroke:#1565C0;stroke-width:0.5;" x1="296.59" x2="598.9089" y1="340.7277" y2="340.7277"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="292.3189" x="301.59" y="359.6937">word_to_id : FxHashMap&lt;Arc&lt;str&gt;, VocabId&gt;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="177.1133" x="301.59" y="378.7616">id_to_word : Vec&lt;Arc&lt;str&gt;&gt;</text><line style="stroke:#1565C0;stroke-width:1;" x1="296.59" x2="598.9089" y1="386.8636" y2="386.8636"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="169.2454" x="301.59" y="405.8295">supports_sharing() = false</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="226.0151" x="301.59" y="424.8974">sequential IDs &#183; O(1) intern/lookup</text></g><!--class PMB--><g class="entity" data-qualified-name="PMB" data-source-line="42" id="ent0004"><rect fill="#ECEFF1" height="140.4075" rx="2.5" ry="2.5" style="stroke:#1565C0;stroke-width:0.5;" width="289.003" x="248.25" y="492.9998"/><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="115.4996" x="335.0017" y="512.9657">PathMapBackend</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="74.3677" x="355.5676" y="532.0337">(cfg f1r3fly)</text><line style="stroke:#1565C0;stroke-width:0.5;" x1="249.25" x2="536.253" y1="541.1356" y2="541.1356"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="277.003" x="254.25" y="560.1016">storage : Arc&lt;PathMap&lt;VocabMetadata&gt;&gt;</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="248.0931" x="254.25" y="579.1695">vocab : IndexMap&lt;Arc&lt;str&gt;, VocabId&gt;</text><line style="stroke:#1565C0;stroke-width:1;" x1="249.25" x2="536.253" y1="587.2715" y2="587.2715"/><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="165.7454" x="254.25" y="606.2374">supports_sharing() = true</text><text fill="#000000" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="218.8332" x="254.25" y="625.3053">copy-on-write &#183; structural sharing</text></g><g class="entity" data-qualified-name="GMN9" data-source-line="56" id="ent0010"><path d="M705.35,331.9198 L705.35,412.7439 A0,0 0 0 0 705.35,412.7439 L1210.1454,412.7439 A0,0 0 0 0 1210.1454,412.7439 L1210.1454,341.9198