<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="259px" preserveAspectRatio="none" style="width:1387px;height:259px;background:#FFFFFF;" version="1.1" viewBox="0 0 1387 259" width="1387px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><g class="title" data-source-line="17"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="351.4266" x="514.5264" y="24.9659">Cascade growth with incremental determinization</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="700" lengthAdjust="spacing" textLength="482.489" x="448.9952" y="40.8268">N = &#960;( min( det( H &#8728; det( C &#8728; det( L &#8728; G ) ) ) ) )  &#8212;  det/min cap the state count after each &#8728;</text></g><!--entity G--><g class="entity" data-qualified-name="G" data-source-line="19" id="ent0001"><rect fill="#FFE0B2" height="58.1358" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="113.4776" x="7" y="62.0498"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="10.136" x="17" y="87.0157">G</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="79.7017" x="30.7759" y="87.0157">&#8212; grammar</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="74.9542" x="26.2617" y="106.0837">&#8776; 1K states</text></g><!--entity LG--><g class="entity" data-qualified-name="LG" data-source-line="20" id="ent0002"><rect fill="#FFCC80" height="58.1358" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="180.1159" x="174.68" y="62.0498"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="34.0056" x="247.7352" y="87.0157">L &#8728; G</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="160.1159" x="184.68" y="106.0837">&#8776; 500K states  (blow-up)</text></g><!--entity DLG--><g class="entity" data-qualified-name="DLG" data-source-line="21" id="ent0003"><rect fill="#FFE0B2" height="58.1358" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="158.0365" x="411.72" y="62.0498"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="66.7794" x="457.3485" y="87.0157">det(L &#8728; G)</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="138.0365" x="421.72" y="106.0837">&#8776; 50K states  (10&#215; &#8595;)</text></g><!--entity CLG--><g class="entity" data-qualified-name="CLG" data-source-line="22" id="ent0004"><rect fill="#FFCC80" height="58.1358" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="111.8111" x="624.83" y="62.0498"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="91.8111" x="634.83" y="87.0157">C &#8728; det(L &#8728; G)</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="90.9702" x="635.2504" y="106.0837">&#8776; 200K states</text></g><!--entity DCLG--><g class="entity" data-qualified-name="DCLG" data-source-line="23" id="ent0005"><rect fill="#FFE0B2" height="58.1358" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="111.8111" x="792.83" y="62.0498"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="91.8111" x="802.83" y="87.0157">det(C &#8728; L &#8728; G)</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="90.9702" x="803.2504" y="106.0837">&#8776; 100K states</text></g><!--entity HCLG--><g class="entity" data-qualified-name="HCLG" data-source-line="24" id="ent0006"><rect fill="#FFCC80" height="58.1358" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="151.3475" x="962.07" y="62.0498"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="118.5647" x="978.4614" y="87.0157">H &#8728; det(C &#8728; L &#8728; G)</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="131.3475" x="972.07" y="106.0837">expand HMM states</text></g><!--entity N--><g class="entity" data-qualified-name="N" data-source-line="25" id="ent0007"><rect fill="#FFB74D" height="58.1358" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="181.4894" x="1191.99" y="62.0498"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="11.382" x="1238.2149" y="87.0157">N</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="74.0177" x="1253.2368" y="87.0157">= &#960;(min(&#8230;))</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.4894" x="1201.99" y="106.0837">minimal decoding graph</text></g><g class="entity" data-qualified-name="GMN14" data-source-line="35" id="ent0015"><path d="M82.05,181.1798 L82.05,244.2979 A0,0 0 0 0 82.05,244.2979 L447.4202,244.2979 A0,0 0 0 0 447.4202,244.2979 L447.4202,191.1798 L437.4202,181.1798 L268.74,181.1798 L264.74,120.4598 L260.74,181.1798 L82.05,181.1798 A0,0 0 0 0 82.05,181.1798" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M437.4202,181.1798 L437.4202,191.1798 L447.4202,191.1798 L437.4202,181.1798" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="320.892" x="99.7891" y="200.0768">Without incremental det the L &#8728; G product can reach</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="331.7733" x="94.3485" y="217.7828">millions of states and exhaust memory before C and H</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="344.3702" x="88.05" y="235.4889">are even composed (docs/asr/cascade-construction.md).</text></g><g class="entity" data-qualified-name="GMN17" data-source-line="41" id="ent0018"><path d="M675.43,181.1798 L675.43,244.2979 A0,0 0 0 0 675.43,244.2979 L1022.0413,244.2979 A0,0 0 0 0 1022.0413,244.2979 L1022.0413,191.1798 L1012.0413,181.1798 L852.74,181.1798 L848.74,120.4598 L844.74,181.1798 L675.43,181.1798 A0,0 0 0 0 675.43,181.1798" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1012.0413,181.1798 L1012.0413,191.1798 L1022.0413,191.1798 L1012.0413,181.1798" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="144.9631" x="685.135" y="200.0768">After each composition,</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="21.619" x="833.4781" y="200.0768">det</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="144.8591" x="858.4771" y="200.0768">(powerset construction)</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="280.9823" x="689.5485" y="217.7828">removes redundant paths and &#949;-arcs; the final</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="25.012" x="973.9108" y="217.7828">min</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="157.1441" x="681.43" y="235.4889">merges equivalent states;</text><text fill="#000000" font-family="sans-serif" font-size="13" font-weight="700" lengthAdjust="spacing" textLength="9.672" x="841.9541" y="235.4889">&#960;</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="152.0351" x="855.0062" y="235.4889">erases auxiliary symbols.</text></g><!--link G to LG--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="27" id="lnk8"><path d="M120.8,91.1098 C137.51,91.1098 151.21,91.1098 169.45,91.1098" fill="none" id="G-to-LG" style="stroke:#BF360C;stroke-width:1.4;"/><polygon fill="#BF360C" points="174.45,91.1098,165.45,87.1098,169.45,91.1098,165.45,95.1098,174.45,91.1098" style="stroke:#BF360C;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="18.3297" x="138.58" y="84.0068">&#8728; L</text></g><!--link LG to DLG--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="28" id="lnk9"><path d="M355.03,91.1098 C373.72,91.1098 388.27,91.1098 406.53,91.1098" fill="none" id="LG-to-DLG" style="stroke:#BF360C;stroke-width:1.4;"/><polygon fill="#BF360C" points="411.53,91.1098,402.53,87.1098,406.53,91.1098,402.53,95.1098,411.53,91.1098" style="stroke:#BF360C;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="20.02" x="373.26" y="84.0068">det</text></g><!--link DLG to CLG--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="29" id="lnk10"><path d="M570.22,91.1098 C588.42,91.1098 602.4,91.1098 619.4,91.1098" fill="none" id="DLG-to-CLG" style="stroke:#BF360C;stroke-width:1.4;"/><polygon fill="#BF360C" points="624.4,91.1098,615.4,87.1098,619.4,91.1098,615.4,95.1098,624.4,91.1098" style="stroke:#BF360C;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="19.7337" x="587.8" y="84.0068">&#8728; C</text></g><!--link CLG to DCLG--><g class="link" data