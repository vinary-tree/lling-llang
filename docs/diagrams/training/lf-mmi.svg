<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="860px" preserveAspectRatio="none" style="width:1092px;height:860px;background:#FFFFFF;" version="1.1" viewBox="0 0 1092 860" width="1092px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><g class="title" data-source-line="18"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="118.7616" x="483.2264" y="24.9659">Lattice-Free MMI</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="700" lengthAdjust="spacing" textLength="503.5545" x="290.8299" y="40.8268">L_MMI = &#8722;( log P_num(x) &#8722; log P_den(x) ) ;  warm-started with cross-entropy (xent_regularize)</text></g><!--entity X--><g class="entity" data-qualified-name="X" data-source-line="20" id="ent0001"><rect fill="#E1BEE7" height="58.1358" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="234.5912" x="365.57" y="62.0498"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="134.4555" x="415.6379" y="87.0157">Acoustic posteriors</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="214.5912" x="375.57" y="106.0837">log P(pdf&#8739;frame)  [T &#215; num_pdfs]</text></g><!--entity NUM--><g class="entity" data-qualified-name="NUM" data-source-line="22" id="ent0002"><rect fill="#FFE0B2" height="77.2038" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="242.7672" x="696.48" y="199.1898"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="123.2975" x="756.2148" y="224.1557">Numerator graph</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="222.7672" x="706.48" y="243.2237">correct transcript &#183; HMM topology</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="156.2674" x="739.7299" y="262.2916">build_numerator_graph</text></g><!--entity DEN--><g class="entity" data-qualified-name="DEN" data-source-line="23" id="ent0003"><rect fill="#FFCC80" height="77.2038" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="283.731" x="7" y="199.1898"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="137.9415" x="79.8947" y="224.1557">Denominator graph</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="263.731" x="17" y="243.2237">phone loop + phone-LM (all hypotheses)</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="171.1774" x="63.2768" y="262.2916">build_denominator_graph</text></g><!--entity PNUM--><g class="entity" data-qualified-name="PNUM" data-source-line="28" id="ent0006"><rect fill="#C8E6C9" height="58.1358" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="198.5273" x="667.6" y="337.3898"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="89.2917" x="722.2178" y="362.3557">log P_num(x)</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="178.5273" x="677.6" y="381.4237">score of the reference path</text></g><!--entity PDEN--><g class="entity" data-qualified-name="PDEN" data-source-line="29" id="ent0007"><rect fill="#C8E6C9" height="58.1358" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="268.2751" x="314.73" y="337.3898"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="83.7477" x="406.9937" y="362.3557">log P_den(x)</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="248.2751" x="324.73" y="381.4237">log &#931;_y P(y&#8739;x)  (leaky-HMM smoothed)</text></g><!--entity MMI--><g class="entity" data-qualified-name="MMI" data-source-line="34" id="ent0010"><rect fill="#FFB74D" height="58.1358" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="207.9072" x="477.91" y="456.5298"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="99.4556" x="532.1358" y="481.4957">MMI objective</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="187.9072" x="487.91" y="500.5637">L = &#8722;(log P_num &#8722; log P_den)</text></g><!--entity REG--><g class="entity" data-qualified-name="REG" data-source-line="38" id="ent0013"><rect fill="#FFCDD2" height="96.2717" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="191.8354" x="485.95" y="593.6598"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="171.8354" x="495.95" y="618.6257">Warmup / regularization</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="166.7393" x="498.498" y="637.6937">+ xent_regularize &#183; L_xent</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="147.8675" x="507.9339" y="656.7616">+ l2_regularize &#183; &#8741;out&#8741;&#178;</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="161.1533" x="501.291" y="675.8295">+ leaky_hmm_coefficient</text></g><!--entity GRAD--><g class="entity" data-qualified-name="GRAD" data-source-line="41" id="ent0015"><rect fill="#ECEFF1" height="77.2038" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="162.41" x="500.66" y="768.9398"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="68.3757" x="547.6771" y="793.9057">Gradients</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="142.41" x="510.66" y="812.9737">&#8706;L / &#8706;(acoustic scores)</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="105.9096" x="528.9102" y="832.0416">LfMmiGradients</text></g><g class="entity" data-qualified-name="GMN17" data-source-line="45" id="ent0018"><path d="M326.16,206.2298 L326.16,233.7898 L291.04,237.7898 L326.16,241.7898 L326.16,269.3479 A0,0 0 0 0 326.16,269.3479 L661.5783,269.3479 A0,0 0 0 0 661.5783,269.3479 L661.5783,216.2298 L651.5783,206.2298 L326.16,206.2298 A0,0 0 0 0 326.16,206.2298" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M651.5783,206.2298 L651.5783,216.2298 L661.5783,216.2298 L651.5783,206.2298" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="148.9801" x="332.16" y="225.1268">The denominator covers</text><text fill="#000000" font-family="sans-serif" font-size="13" font-style="italic" lengthAdjust="spacing" textLength="14.092" x="484.5201" y="225.1268">all</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="144.5861" x="501.9922" y="225.1268">competing word/phone</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="313.8723" x="332.433" y="242.8328">sequences, so the lattice never has to be generated</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="306.5533" x="336.0925" y="260.5389">explicitly &#8212; hence "lattice-free" (Povey et al. 2016).</text></g><g class="entity" data-qualified-name="GMN20" data-source-line="51" id="ent0021"><path d="M712.52,610.2398 L712.52,637.7998 L678.15,641.7998 L712.52,645.7998 L712.52,673.3579 A0,0 0 0 0 712.52,673.3579 L1077.2143,673.3579 A0,0 0 0 0 1077.2143,673.3579 L1077.2143,620.2398 L1067.2143,610.2398 L712.52,610.2398 A0,0 0 0 0 712.52,610.2398" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1067.2143,610.2398 L1067.2143,620.2398 L1077.2143,620.2398 L1067.2143,610.2398" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="325.2733" x="727.7305" y="629.1368">Early in training the MMI signal is noisy; interpolating</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="343.6943" x="718.52" y="646.8428">with frame-level cross-entropy (the warmup term) keeps</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="307.0343" x="736.85" y="664.5489">optimization stable until the model is well-aligned.</text></g><!--link X to NUM--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="25" id="lnk4"><path d="M548.65,120.5298 C600.38,142.8698 668.3597,172.2276 725.1197,196.7376" fill="none" id="X-to-NUM" style="stroke:#BF360C;stroke-width:1.4;"/><polygon fill="#BF360C" points="729.71,198.7198,723.0332,191.4796,725.1197,196.7376,719.8617,198.8241,729.71,198.7198" style="stroke:#BF360C;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="112.1121" x="661.41" y="165.0868">forward-backward</text></g><!--link X to DEN--><g class="link" data-entity-1="ent0001" data-entity-2="ent0003" data-link-type="dependency" data-source-line="26" id="lnk5"><path d="M417.28,120.5298 C365.7,142.8698 297.9381,172.2226 241.3481,196.7326" fill="none" id="X-to-DEN" style="stroke:#BF360C;stroke-width:1.4;"/><polygon fill="#BF360C" points="236.76,198.7198,246.6084,198.8134,241.3481,196.7326,243.4289,191.4723,236.76,198.7198" style="stroke:#BF360C;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="112.1121" x="346.78" y="165.0868">forward-backward</text></g><!--link NUM to PNUM--><g class="link" data-entity-1="ent0002" data-entity-2="ent0006" data-link-type="dependency" data-source-line="31" id="lnk8"><path d="M802.56,276.7998 C794.76,296.1798 787.2991,314.7223 780.1291,332.5123" fill="none" id="NUM-to-PNUM" style="stroke:#BF360C;stroke-width:1.4;"/><polygon fill="#BF360C" points="778.26,337.1498,785.3344,330.2975,780.1291,332.5123,777.9143,327.307,778.26,337.1498" style="stroke:#BF360C;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link DEN to PDEN--><g class="link" data-entity-1="ent0003" data-entity-2="ent0007" data-link-type="dependency" data-source-line="32" id="lnk9"><path d="M238.88,276.7998 C284.61,296.1098 334.6539,317.2347 376.7339,335.0047" fill="none" id="DEN-to-PDEN" style="stroke:#BF360C;stroke-width:1.4;"/><polygon fill="#BF360C" points="381.34,336.9498,374.6051,329.7637,376.7339,335.0047,371.4929,337.1335,381.34,336.9498" style="stroke:#BF360C;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link PNUM to MMI--><g class="link" data-entity-1="ent0006" data-entity-2="ent0010" data-link-type="dependency" data-source-line="35" id="lnk11"><path d="M722.08,395.8198 C693.21,414.0998 660.0245,435.1152 631.1045,453.4252" fill="none" id="PNUM-to-MMI" style="stroke:#BF360C;stroke-width:1.4;"/><polygon fill="#BF360C" points="626.88,456.0998,636.6238,454.6651,631.1045,453.4252,632.3444,447.9059,626.88,456.0998" style="stroke:#BF360C;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link PDEN to MMI--><g class="link" data-entity-1="ent0007" data-entity-2="ent0010" data-link-type="dependency" data-source-line="36" id="lnk12"><path d="M481.06,395.8198 C501.82,414.0998 524.9678,434.4852 545.7578,452.7952" fill="none" id="PDEN-to-MMI" style="stroke:#BF360C;stroke-width:1.4;"/><polygon fill="#BF360C" points="549.51,456.0998,545.3997,447.1497,545.7578,452.7952,540.1122,453.1532,549.51,456.0998" style="stroke:#BF360C;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link MMI to REG--><g class="link" data-entity-1="ent0010" data-entity-2="ent0013" data-link-type="dependency" data-source-line="39" id="lnk14"><path d="M581.87,514.8798 C581.87,536.7898 581.87,562.6398 581.87,588.3198" fill="none" id="MMI-to-REG" style="stroke:#BF360C;stroke-width:1.4;"/><polygon fill="#BF360C" points="581.87,593.3198,585.87,584.3198,581.87,588.3198,577.87,584.3198,581.87,593.3198" style="stroke:#BF360C;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="67.3141" x="582.87" y="559.5568">interpolate</text></g><!--link REG to GRAD--><g class="link" data-entity-1="ent0013" data-entity-2="ent0015" data-link-type="dependency" data-source-line="42" id="lnk16"><path d="M581.87,690.1598 C581.87,715.0898 581.87,740.2598 581.87,763.6298" fill="none" id="REG-to-GRAD" style="stroke:#BF360C;stroke-width:1.4;"/><polygon fill="#BF360C" points="581.87,768.6298,585.87,759.6298,581.87,763.6298,577.87,759.6298,581.87,768.6298" style="stroke:#BF360C;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="57.694" x="582.87" y="734.8368">backprop</text></g><?plantuml-src RLNDRjj64BxpAGRk8H8IMZzDxDHM1TZwSGj8Xc6uQ82c45RaaDnwkSlkhYmhGO6Y9v-B0ds0e2_GI-_flG-X9-diafPfsZfGvEpEVFFppSmBc35hUOJXL2F2VFujMCsuv38z0fiXo5MEcbcb8TMioA0LAQqnikwQD97cXMq3ax6x7Bo06ANAkQmh59cI24Af0bx2R0wHka5Dze490TccKAHfqBG1MPI18VjO6MEHMXbo3WfbBEaeRU26CqYKNZCTXqiMNRkNO--fyrqjVoBV-0q2Dqx8DSGyIL2ZZF0LcQJhESQmAg03nh8b5_m3VIyt46bbJ8ZIQbLiG6Ew4app3yno9VTXpcn4RfA5vOgBUB5BowACibF9Q_7lJaIIvtmXo3nzp99vpaTA9Zm5BicUqL7dFkKTVtMVmcnTK9OsW9Qoj0_zRk-WlH-OQouBfbaEBl9KgvMCHqfGgh-O-b_jXibOhDOkpGaJ1cidCIPi9UmLtjeJmLEPKymGqGDrxTQ9rcfT6J-TVddG7JKFhp8UNKkag7hxhsk7ZXrCfWBXOm1mMJgf9MhezKamLT9MTdlTVhT_IB