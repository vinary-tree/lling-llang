<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="848px" preserveAspectRatio="none" style="width:1196px;height:848px;background:#FFFFFF;" version="1.1" viewBox="0 0 1196 848" width="1196px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><g class="title" data-source-line="16"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="69.6357" x="477.6327" y="24.9659">lling-llang</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="160.7614" x="550.9084" y="24.9659">&#8212; module architecture</text><text fill="#000000" font-family="sans-serif" font-size="11" font-style="italic" font-weight="700" lengthAdjust="spacing" textLength="387.5601" x="400.8712" y="40.8268">each tier builds on the one below; formal verification underwrites the core</text></g><!--entity APP--><g class="entity" data-qualified-name="APP" data-source-line="18" id="ent0001"><rect fill="#ECEFF1" height="39.0679" rx="6" ry="6" style="stroke:#455A64;stroke-width:0.5;" width="574.0618" x="238.95" y="62.0498"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="86.4917" x="248.95" y="87.0157">Applications</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="460.2902" x="342.7216" y="87.0157">&#183;  grammar correction  &#183;  speech recognition  &#183;  constrained generation</text></g><!--entity SPEECH--><g class="entity" data-qualified-name="SPEECH" data-source-line="20" id="ent0002"><rect fill="#FFE0B2" height="58.1358" rx="6" ry="6" style="stroke:#455A64;stroke-width:0.5;" width="780.3085" x="135.83" y="162.1198"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="188.2012" x="431.8836" y="187.0857">Speech &amp; sequence models</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="760.3085" x="145.83" y="206.1537">asr  (H &#8728; C &#8728; L &#8728; G cascade)  &#183;  acoustic  &#183;  ctc topologies  &#183;  transducer (RNN-T)  &#183;  training (LF-MMI &#183; weak-supervision)</text></g><!--entity DL--><g class="entity" data-qualified-name="DL" data-source-line="22" id="ent0003"><rect fill="#E1BEE7" height="58.1358" rx="6" ry="6" style="stroke:#455A64;stroke-width:0.5;" width="693.6497" x="179.16" y="281.2498"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="202.1172" x="424.9262" y="306.2157">Deep learning &amp; acceleration</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="673.6497" x="189.16" y="325.2837">differentiable  (GTN-style autograd, top-down/k2)  &#183;  gpu  (CSR &#183; uint64 token-packing &#183; k-vector)  &#183;  simd</text></g><!--entity NLP--><g class="entity" data-qualified-name="NLP" data-source-line="24" id="ent0004"><rect fill="#FFF59D" height="58.1358" rx="6" ry="6" style="stroke:#455A64;stroke-width:0.5;" width="747.0598" x="152.45" y="400.3898"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="165.4654" x="443.2472" y="425.3557">Correction &amp; NLP layers</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="727.0598" x="162.45" y="444.4237">layers  &#183;  error_models  &#183;  text_processing (TN/ITN)  &#183;  multilingual  &#183;  llm (constrained decoding)  &#183;  programming</text></g><!--entity TRANS--><g class="entity" data-qualified-name="TRANS" data-source-line="26" id="ent0005"><rect fill="#B2DFDB" height="58.1358" rx="6" ry="6" style="stroke:#455A64;stroke-width:0.5;" width="616.2858" x="217.84" y="529.0598"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="220.1632" x="415.9013" y="554.0257">Grammar &amp; transducer families</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="596.2858" x="227.84" y="573.0937">cfg  (Earley on lattices)  &#183;  multitape  &#183;  pushdown (PDA)  &#183;  tree_transducers  &#183;  subsequential</text></g><!--entity ALG--><g class="entity" data-qualified-name="ALG" data-source-line="28" id="ent0006"><rect fill="#C8E6C9" height="58.1358" rx="6" ry="6" style="stroke:#455A64;stroke-width:0.5;" width="1037.9649" x="7" y="657.7298"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="77.7557" x="487.1046" y="682.6957">Algorithms</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="1017.9649" x="17" y="701.7637">algorithms  (shortest-distance &#183; weight-pushing &#183; &#949;-removal &#183; determinize &#183; minimize &#183; connect)  &#183;  path  (viterbi &#183; nbest &#183; beam)  &#183;  composition  &#183;  optimization</text></g><!--entity FND--><g class="entity" data-qualified-name="FND" data-source-line="30" id="ent0007"><rect fill="#BBDEFB" height="58.1358" rx="6" ry="6" style="stroke:#455A64;stroke-width:0.5;" width="724.6425" x="457.66" y="776.8598"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="297.2048" x="671.3788" y="801.8257">Foundation &#8212; weighted-automata algebra</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="704.6425" x="467.66" y="820.8937">semiring  (K, &#8853;, &#8855;, 0&#772;, 1&#772;)  &#183;  wfst  (states &#183; arcs &#183; lazy ops)  &#183;  lattice  (weighted DAG)  &#183;  backend  (vocab storage)</text></g><!--entity FV--><g class="entity" data-qualified-name="FV" data-source-line="32" id="ent0008"><rect fill="#FFCDD2" height="77.2038" rx="6" ry="6" style="stroke:#455A64;stroke-width:0.5;" width="152.6635" x="953.65" y="519.5198"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="132.6635" x="963.65" y="544.4857">Formal verification</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="110.1376" x="974.913" y="563.5537">Coq/Rocq proofs</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="80.8217" x="989.5709" y="582.6216">TLA&#8314; models</text></g><!--reverse link ALG to FND--><g class="link" data-entity-1="ent0006" data-entity-2="ent0007" data-link-type="dependency" data-source-line="34" id="lnk10"><path d="M602.1748,718.1506 C647.9748,736.4006 702.55,758.1498 748.37,776.3998" fill="none" id="ALG-backto-FND" style="stroke:#37474F;stroke-width:1.4;"/><polygon fill="#37474F" points="597.53,716.2998,604.41,723.3472,602.1748,718.1506,607.3714,715.9154,597.53,716.2998" style="stroke:#37474F;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--reverse link TRANS to ALG--><g class="link" data-entity-1="ent0005" data-entity-2="ent0006" data-link-type="dependency" data-source-line="35" id="lnk12"><path d="M525.98,592.5498 C525.98,613.4198 525.98,636.6198 525.98,657.4598" fill="none" id="TRANS-backto-ALG" style="stroke:#37474F;stroke-width:1.4;"/><polygon fill="#37474F" points="525.98,587.5498,521.98,596.5498,525.98,592.5498,529.98,596.5498,525.98,587.5498" style="stroke:#37474F;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--reverse link NLP to TRANS--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="36" id="lnk14"><path d="M525.98,463.8798 C525.98,484.7498 525.98,507.9598 525.98,528.7898" fill="none" id="NLP-backto-TRANS" style="stroke:#37474F;stroke-width:1.4;"/><polygon fill="#37474F" points="525.98,458.8798,521.98