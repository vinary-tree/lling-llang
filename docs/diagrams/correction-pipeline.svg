<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="756px" preserveAspectRatio="none" style="width:438px;height:756px;background:#FFFFFF;" version="1.1" viewBox="0 0 438 756" width="438px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><g class="title" data-source-line="13"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="133.6435" x="10" y="24.9659">Correction pipeline</text><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="273.9229" x="147.2835" y="24.9659">&#8212; from raw text to the best hypothesis</text></g><!--entity IN--><g class="entity" data-qualified-name="IN" data-source-line="15" id="ent0001"><rect fill="#ECEFF1" height="58.1358" rx="6" ry="6" style="stroke:#455A64;stroke-width:0.5;" width="119.7636" x="155.7208" y="47.0679"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="38.5698" x="196.3177" y="72.0339">Input</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="99.7636" x="165.7208" y="91.1018">\"teh quik fox\"</text></g><!--entity CAND--><g class="entity" data-qualified-name="CAND" data-source-line="16" id="ent0002"><rect fill="#FFF59D" height="71.7558" rx="6" ry="6" style="stroke:#455A64;stroke-width:0.5;" width="323.8688" x="53.6708" y="165.1979"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="152.2354" x="139.4876" y="190.1639">Candidate generation</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="303.8688" x="63.6708" y="209.2318">lexical (edit-distance) &#183; phonetic &#183; error-models</text><text fill="#102027" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="185.2498" x="122.9804" y="224.0237">liblevenshtein &#183; confusion &#183; homophone</text></g><!--entity LAT--><g class="entity" data-qualified-name="LAT" data-source-line="17" id="ent0003"><rect fill="#BBDEFB" height="77.2038" rx="6" ry="6" style="stroke:#455A64;stroke-width:0.5;" width="348.8447" x="41.1808" y="296.9579"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="115.4296" x="135.3695" y="321.9239">Weighted lattice</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="37.7578" x="258.079" y="321.9239">(DAG)</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="328.8447" x="51.1808" y="340.9918">exponentially many hypotheses, shared structure;</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="233.8271" x="98.6896" y="360.0597">costs on arcs come from a semiring</text></g><!--entity LAYERS--><g class="entity" data-qualified-name="LAYERS" data-source-line="18" id="ent0004"><rect fill="#FFF59D" height="71.7558" rx="6" ry="6" style="stroke:#455A64;stroke-width:0.5;" width="316.1083" x="57.5508" y="434.1579"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="98.5176" x="166.3462" y="459.1239">Layer pipeline</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="296.1083" x="67.5508" y="478.1918">lexical  &#8594;  CFG filter  &#8594;  LM rerank  &#8594;  custom</text><text fill="#102027" font-family="sans-serif" font-size="10" lengthAdjust="spacing" textLength="193.3098" x="118.9501" y="492.9837">each layer filters paths or re-weights arcs</text></g><!--entity PATH--><g class="entity" data-qualified-name="PATH" data-source-line="19" id="ent0005"><rect fill="#C8E6C9" height="58.1358" rx="6" ry="6" style="stroke:#455A64;stroke-width:0.5;" width="274.183" x="78.5108" y="565.9179"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="108.4016" x="161.4016" y="590.8839">Path extraction</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="254.183" x="88.5108" y="609.9518">viterbi (best)  &#183;  nbest(k)  &#183;  beam(width)</text></g><!--entity OUT--><g class="entity" data-qualified-name="OUT" data-source-line="20" id="ent0006"><rect fill="#ECEFF1" height="58.1358" rx="6" ry="6" style="stroke:#455A64;stroke-width:0.5;" width="126.4836" x="152.3608" y="684.0479"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="50.2738" x="190.4657" y="709.0139">Output</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="106.4836" x="162.3608" y="728.0818">\"the quick fox\"</text></g><!--link IN to CAND--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="22" id="lnk7"><path d="M215.6008,105.6479 C215.6008,123.3779 215.6008,141.3079 215.6008,160.1379" fill="none" id="IN-to-CAND" style="stroke:#37474F;stroke-width:1.4;"/><polygon fill="#37474F" points="215.6008,165.1379,219.6008,156.1379,215.6008,160.1379,211.6008,156.1379,215.6008,165.1379" style="stroke:#37474F;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link CAND to LAT--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="23" id="lnk8"><path d="M215.6008,237.2379 C215.6008,255.6279 215.6008,273.1679 215.6008,291.9179" fill="none" id="CAND-to-LAT" style="stroke:#37474F;stroke-width:1.4;"/><polygon fill="#37474F" points="215.6008,296.9179,219.6008,287.9179,215.6008,291.9179,211.6008,287.9179,215.6008,296.9179" style="stroke:#37474F;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link LAT to LAYERS--><g class="link" data-entity-1="ent0003" data-entity-2="ent0004" data-link-type="dependency" data-source-line="24" id="lnk9"><path d="M215.6008,374.5179 C215.6008,393.1779 215.6008,410.5179 215.6008,428.7979" fill="none" id="LAT-to-LAYERS" style="stroke:#37474F;stroke-width:1.4;"/><polygon fill="#37474F" points="215.6008,433.7979,219.6008,424.7979,215.6008,428.7979,211.6008,424.7979,215.6008,433.7979" style="stroke:#37474F;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link LAYERS to PATH--><g class="link" data-entity-1="ent0004" data-entity-2="ent0005" data-link-type="dependency" data-source-line="25" id="lnk10"><path d="M215.6008,506.2679 C215.6008,525.1479 215.6008,543.0779 215.6008,560.7679" fill="none" id="LAYERS-to-PATH" style="stroke:#37474F;stroke-width:1.4;"/><polygon fill="#37474F" points="215.6008,565.7679,219.6008,556.7679,215.6008,560.7679,211.6008,556.7679,215.6008,565.7679" style="stroke:#37474F;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><!--link PATH to OUT--><g class="link" data-entity-1="ent0005" data-entity-2="ent0006" data-link-type="dependency" data-source-line="26" id="lnk11"><path d="M215.6008,624.3979 C215.6008,642.3879 215.6008,660.5879 215.6008,678.5979" fill="none" id="PATH-to-OUT" style="stroke:#37474F;stroke-width:1.4;"/><polygon fill="#37474F" points="215.6008,683.5979,219.6008,674.5979,215.6008,678.5979,211.6008,674.5979,215.6008,683.5979" style="stroke:#37474F;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/></g><?plantuml-src TLF1RXen4BtlLupWK91A6bAID2b2MXP88z4aIgcgIboCTs0jlFRMzWPeLQcdVa3LV-czdv8lwNXPmWQfUrZPpvwPDs-UNy0aGU3Q6EHEQ0KnSwoLCPTSWc4hSBXsyFZp5t2cOa67298v9pWMg6GRD9293ALGMsY6ra6ooRHBq0fx5DYbK1apB8KPuyk5qRcA8osrWVge-2etRC9YlH9g0NCcBLPEOfopNBe9yGcbMAWKbGDEFpILMxuBfXOIuLi0SByjPHHnR9yGCDBAbQNRnoV79-U4zRM9qPHev_GqFEi4toifGsFqgZn-VTuvxumE3oU9u4k5raBxg1C4JZYgtvtrehsgEuMwhsOzUFpn6-P6ftk1dGPIwr2w8DYtKwDyrohBdSymLTEQmmI-v689SxsUrch0B5pVG7qO3KUZza5Wz3Ix1P8Mp5FQvf6u5f