<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" data-diagram-type="DESCRIPTION" height="839px" preserveAspectRatio="none" style="width:771px;height:839px;background:#FFFFFF;" version="1.1" viewBox="0 0 771 839" width="771px" zoomAndPan="magnify"><?plantuml $version$?><defs/><g><g class="title" data-source-line="17"><text fill="#000000" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="334.8367" x="214.9946" y="24.9659">Neural posterior fusion into the decoding graph</text><text fill="#000000" font-family="sans-serif" font-size="11" font-weight="700" lengthAdjust="spacing" textLength="416.7761" x="174.0249" y="40.8268">combined = &#955;_am &#183; log P(unit&#8739;frame) + &#955;_lm &#183; log P(word&#8739;context) + penalties</text></g><!--entity X--><g class="entity" data-qualified-name="X" data-source-line="19" id="ent0001"><rect fill="#ECEFF1" height="58.1358" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="131.7616" x="70.55" y="62.0498"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="93.3096" x="89.776" y="87.0157">Audio frames</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="111.7616" x="80.55" y="106.0837">[T &#215; feature_dim]</text></g><!--entity AM--><g class="entity" data-qualified-name="AM" data-source-line="20" id="ent0002"><rect fill="#E1BEE7" height="58.1358" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="159.4395" x="56.71" y="199.1898"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="102.6056" x="85.1269" y="224.1557">AcousticModel</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="139.4395" x="66.71" y="243.2237">neural net &#183; forward()</text></g><!--entity POST--><g class="entit