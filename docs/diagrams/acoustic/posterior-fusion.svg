_lm &#183; lm_weight</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="138.8095" x="200.03" y="574.6895">word/blank penalties</text></g><!--entity DEC--><g class="entity" data-qualified-name="DEC" data-source-line="32" id="ent0010"><rect fill="#C8E6C9" height="58.1358" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="249.8216" x="144.52" y="667.7998"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="47.0398" x="245.9109" y="692.7657">Search</text><text fill="#102027" font-family="sans-serif" font-size="14" lengthAdjust="spacing" textLength="229.8216" x="154.52" y="711.8337">Viterbi / beam over  posteriors &#8855; N</text></g><!--entity W--><g class="entity" data-qualified-name="W" data-source-line="33" id="ent0011"><rect fill="#ECEFF1" height="39.0679" rx="6" ry="6" style="stroke:#E65100;stroke-width:0.5;" width="64.4218" x="237.22" y="786.9298"/><text fill="#102027" font-family="sans-serif" font-size="14" font-weight="700" lengthAdjust="spacing" textLength="44.4218" x="247.22" y="811.8957">Words</text></g><g class="entity" data-qualified-name="GMN14" data-source-line="39" id="ent0015"><path d="M390.04,500.2498 L390.04,536.6598 L354.93,540.6598 L390.04,544.6598 L390.04,581.0739 A0,0 0 0 0 390.04,581.0739 L756.8259,581.0739 A0,0 0 0 0 756.8259,581.0739 L756.8259,510.2498 L746.8259,500.2498 L390.04,500.2498 A0,0 0 0 0 390.04,500.2498" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M746.8259,500.2498 L746.8259,510.2498 L756.8259,510.2498 L746.8259,500.2498" fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="318.6173" x="409.6243" y="519.1468">Scores live in a log-domain semiring (LogWeight), so</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="337.2319" x="400.317" y="536.8528">the fused product is a semiring &#8855; and alternative paths</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="345.7859" x="396.04" y="554.5589">combine with &#8853;. AcousticLanguageModel::to_log_weight</text><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="254.0722" x="441.8968" y="572.2649">packages the result as a WFST arc weight.</text></g><!--link X to AM--><g class="link" data-entity-1="ent0001" data-entity-2="ent0002" data-link-type="dependency" data-source-line="23" id="lnk4"><path d="M136.43,120.4498 C136.43,143.5098 136.43,170.9098 136.43,193.9598" fill="none" id="X-to-AM" style="stroke:#6A1B9A;stroke-width:1.4;"/><polygon fill="#6A1B9A" points="136.43,198.9598,140.43,189.9598,136.43,193.9598,132.43,189.9598,136.43,198.9598" style="stroke:#6A1B9A;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="50.752" x="137.43" y="165.0868">features</text></g><!--link AM to POST--><g class="link" data-entity-1="ent0002" data-entity-2="ent0003" data-link-type="dependency" data-source-line="24" id="lnk5"><path d="M136.43,257.4898 C136.43,279.8598 136.43,306.3198 136.43,330.8998" fill="none" id="AM-to-POST" style="stroke:#6A1B9A;stroke-width:1.4;"/><polygon fill="#6A1B9A" points="136.43,335.8998,140.43,326.8998,136.43,330.8998,132.43,326.8998,136.43,335.8998" style="stroke:#6A1B9A;stroke-width:1.4;stroke-linejoin:miter;stroke-miterlimit:10;"/><text fill="#000000" font-family="sans-serif" font-size="13" lengthAdjust="spacing" textLength="123.7341" x="137.43" y="302.2168">per-frame log-probs</text></g><!--link POST to FUSE--><g class="link" data-entity-1="ent0003" data-entity-2="ent0007" data-link-type="dependency" data-source-line="29" id="lnk8"><path d="M167.28,413.8998 C186.23,437.2298 207.5281,463.4384 227.7481,488.3384" fill="none" id="POST-to-FUSE" style="